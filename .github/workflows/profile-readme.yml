name: Update Profile README Assets

on:
  schedule:
    - cron: "0 0 * * *"      # regenerates once a day
  workflow_dispatch:          # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generates the two snake SVGs your README already references
      - name: Generate contribution snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Self-hosted trophy generation -- avoids the vercel.app service entirely,
      # so it isn't affected by that project's rate-limit/payment issues
      - name: Generate trophy image
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          file: dist/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Publishes everything in dist/ to the "output" branch, which is what
      # your README's raw.githubusercontent.com links point to
      - name: Deploy assets to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake + trophy assets [skip ci]"